spring.application.name=password-safe-backend

# H2 In-Memory Datenbank
spring.datasource.url=jdbc:h2:mem:passwordsafedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret (in Produktion: aus Umgebungsvariable)
app.jwt.secret=password-safe-super-secret-key-minimum-256-bits-for-hs256-algorithm
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Server Port
server.port=8080
